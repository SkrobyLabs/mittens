# Mittens network whitelist (active by default)
# One domain per line. Lines starting with # are comments.
# Inline comments (domain # reason) are also supported.
# All domains are allowed on ports 443, 80, and 22.
#
# To customise: mittens --firewall /path/to/your.conf
# To disable:   mittens --no-firewall

# ── Claude Code (required) ───────────────────────────────
api.anthropic.com           # Claude API and inference
claude.ai                   # OAuth authorize flow
platform.claude.com         # OAuth token refresh, billing, docs
console.anthropic.com       # Anthropic console / account management
mcp-proxy.anthropic.com     # Anthropic remote MCP proxy
statsig.anthropic.com       # Feature gating
sentry.io                   # Error reporting
cdn.growthbook.io           # Feature flags
api.segment.io              # Telemetry

# ── Git hosting ──────────────────────────────────────────
github.com                  # Git over HTTPS + web API
api.github.com              # GitHub REST / GraphQL API
gitlab.com                  # Git over HTTPS
ssh.gitlab.com              # Git over SSH (alt port)
bitbucket.org               # Git over HTTPS
altssh.bitbucket.org        # Git over SSH (alt port)

