# mcp extension for mittens
# Whitelists MCP server API domains through the network firewall.
# MCP servers run inside the container but their backend API calls are blocked
# unless explicitly whitelisted. The entrypoint resolves domains at runtime.

name: mcp
description: Experimental MCP server passthrough

flags:
  - name: "--mcp"
    description: "Experimental: whitelist MCP server API domains (repeatable, comma-separated)"
    arg: "csv"
  - name: "--mcp-all"
    description: "Experimental: whitelist all configured MCP servers"
