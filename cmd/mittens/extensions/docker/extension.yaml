name: docker
description: Connect the container to a Docker engine (dind or host socket)

flags:
  - name: "--docker"
    description: "Docker engine: dind (isolated daemon) or host (share host socket)"
    arg: "enum"
    enum_values: ["dind", "host"]

# Installs Docker CE at build time; runs only when this capability is enabled.
build:
  script: "docker.sh"
  image_tag: "docker"
