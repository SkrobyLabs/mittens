# dotnet extension for mittens
# Installs the .NET SDK into the Docker image at build time.
# Optionally pins a major version (8, 9, 10); defaults to LTS.

name: dotnet
description: Install .NET SDK into the container image

flags:
  - name: "--dotnet"
    description: "Install .NET SDK (VERSION: 8, 9, 10 — comma-separated; default: LTS)"
    arg: "enum"
    enum_values: ["8", "9", "10"]
    multi: true

firewall:
  - "nuget.org"
  - "api.nuget.org"
  - "azuresearch-usnc.nuget.org"
  - "azuresearch-ussc.nuget.org"
  - "pkgs.dev.azure.com"

mounts:
  - src: "~/.nuget/packages"
    dst: "~/.nuget/host-packages"
    mode: "ro"
    when: "dir_exists"
    env:
      NUGET_FALLBACK_PACKAGES: "~/.nuget/host-packages"
  # TODO: These credential/config mounts are only a best-effort cross-OS fallback.
  # They work for common Linux-style layouts, but native Windows/macOS credential
  # storage differs. Replace this YAML-only approach with a dotnet resolver that
  # stages NuGet/Azure Artifacts auth from host-specific locations.
  - src: "~/.nuget/NuGet"
    dst: "~/.nuget/NuGet"
    mode: "ro"
    when: "dir_exists"
  - src: "~/.nuget/plugins"
    dst: "~/.nuget/plugins"
    mode: "ro"
    when: "dir_exists"
  - src: "~/.local/share/MicrosoftCredentialProvider"
    dst: "~/.local/share/MicrosoftCredentialProvider"
    mode: "rw"
    when: "dir_exists"
  - src: "~/.local/share/NuGet"
    dst: "~/.local/share/NuGet"
    mode: "rw"
    when: "dir_exists"

build:
  script: "dotnet.sh"
  image_tag: "dotnet{{.Arg}}"
  args:
    DOTNET_CHANNEL: "{{if .Arg}}{{.Arg}}{{else}}LTS{{end}}"
