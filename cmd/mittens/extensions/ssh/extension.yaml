# ssh extension for mittens
# Mounts SSH keys into the container (read-only).

name: ssh
description: Mount SSH keys (~/.ssh) into the container

flags:
  - name: "--ssh"
    description: "Mount SSH keys (~/.ssh, read-only)"
    arg: "none"

mounts:
  - src: "~/.ssh"
    dst: "~/.ssh"
    mode: "ro"
    when: "dir_exists"
