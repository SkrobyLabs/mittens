# MCP server name → API domain(s)
# Format: name=domain1,domain2
#
# Mittens uses this to whitelist API domains for MCP servers.
# User overrides: ~/.claude/mcp-domains.conf (same format, takes priority)

shortcut=api.app.shortcut.com
notion=api.notion.com
linear=api.linear.app
slack=.slack.com
github=api.github.com
gitlab=gitlab.com
sentry=sentry.io
jira=.atlassian.net
confluence=.atlassian.net
figma=api.figma.com
asana=app.asana.com
