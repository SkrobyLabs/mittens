# Mittens developer-friendly network whitelist (--firewall-dev)
# Superset of firewall.conf — adds cloud provider APIs, system repos,
# and common CDN domains for development workflows.
#
# One domain per line. Lines starting with # are comments.
# Prefix with . for subdomain wildcard (matches the domain and all subdomains).
#
# To use:      mittens --firewall-dev
# To customise: mittens --firewall /path/to/your.conf
# To disable:   mittens --no-firewall

